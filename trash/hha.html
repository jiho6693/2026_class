<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pixelated Text Stream</title>
  <style>
    html, body { margin:0; height:100%; background:#000; overflow:hidden; }
    canvas { display:block; width:100vw; height:100vh; }
    /* Optional: hide text selection */
    * { user-select: none; -webkit-user-select:none; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<script>
/**
 * Pixelated text renderer (big pixels)
 * - Renders text onto an offscreen canvas
 * - Downscales to a smaller canvas (pixel grid)
 * - Upscales back to screen with imageSmoothing disabled
 *
 * How to tweak:
 *  - pixelSize: bigger => chunkier pixels
 *  - fontSize, lineHeight, margin
 *  - scrollSpeed: px/sec
 *  - useBlocks: true => random "text blocks" instead of continuous lines
 */

const TEXT = `친형과 나는 외할머니를 축구할머니라고 불렀다. 같이 축구를 해서인거같은데, 이제와서는 기억이 잘 나지 않는다. 친할머니가 아프셔서 엄마는 집을 비울때가 많으셨고, 외할머니는 우리 집에 자주 오시곤 하셨다. 나는 이야기를 듣는걸 좋아했고, 축구할머니는 옛날이야기를 종종하시곤 하셨다.

축구할머니는 평양에서 태어나셨는데, 평양교회에서 전쟁소식을 들으셨다고 했다. ... (여기에 전체 텍스트를 붙여넣어도 됨)
축구할머니는 평양에서 태어나셨는데, 평양교회에서 전쟁소식을 들으셨다고 했다. ... (여기에 전체 텍스트를 붙여넣어도 됨)
축구할머니는 평양에서 태어나셨는데, 평양교회에서 전쟁소식을 들으셨다고 했다. ... (여기에 전체 텍스트를 붙여넣어도 됨)
축구할머니는 평양에서 태어나셨는데, 평양교회에서 전쟁소식을 들으셨다고 했다. ... (여기에 전체 텍스트를 붙여넣어도 됨)
축구할머니는 평양에서 태어나셨는데, 평양교회에서 전쟁소식을 들으셨다고 했다. ... (여기에 전체 텍스트를 붙여넣어도 됨)
축구할머니는 평양에서 태어나셨는데, 평양교회에서 전쟁소식을 들으셨다고 했다. ... (여기에 전체 텍스트를 붙여넣어도 됨)
축구할머니는 평양에서 태어나셨는데, 평양교회에서 전쟁소식을 들으셨다고 했다. ... (여기에 전체 텍스트를 붙여넣어도 됨)
축구할머니는 평양에서 태어나셨는데, 평양교회에서 전쟁소식을 들으셨다고 했다. ... (여기에 전체 텍스트를 붙여넣어도 됨)
축구할머니는 평양에서 태어나셨는데, 평양교회에서 전쟁소식을 들으셨다고 했다. ... (여기에 전체 텍스트를 붙여넣어도 됨)
축구할머니는 평양에서 태어나셨는데, 평양교회에서 전쟁소식을 들으셨다고 했다. ... (여기에 전체 텍스트를 붙여넣어도 됨)

중학교, 고등학교를 졸업하고 나서 대학교에 들어가고나서부터는 나는 교회를 점차 안가기 시작했고, 형이 먼저 다니지 않아서 부모님의 잔소리로부터 조금은 피할수 있었다.`;

const cfg = {
  pixelSize: 508,        // "큰 픽셀" 크기 (화면 픽셀 단위). 8~24 추천
  font: "sans-serif",   // "monospace"도 정보 느낌 강함
  fontSize: 28,         // 오프스크린 텍스트 크기
  lineHeight: 42,
  margin: 64,
  scrollSpeed: 140,     // px / sec
  fg: "#ffffff",
  bg: "#000000",

  // optional modes
  useBlocks: false,     // true면 랜덤 텍스트 블록을 띄우는 모드
  blockCharsMin: 40,
  blockCharsMax: 120,
  blockIntervalMs: 180, // 블록 모드일 때 갱신 주기
};

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// Offscreen canvas for sharp text
const textCanvas = document.createElement("canvas");
const tctx = textCanvas.getContext("2d");

// Small canvas for pixel grid
const smallCanvas = document.createElement("canvas");
const sctx = smallCanvas.getContext("2d", { willReadFrequently: true });

let W = 0, H = 0;
let scrollY = 0;
let lastTS = performance.now();

// text layout cache
let lines = [];
let totalTextHeight = 0;

// block mode cache
let lastBlockAt = 0;
let blockText = "";
let blockLines = [];
let blockHeight = 0;

function resize() {
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = window.innerHeight + "px";

  W = canvas.width;
  H = canvas.height;

  // Offscreen text canvas at full resolution
  textCanvas.width = W;
  textCanvas.height = H;

  // Small canvas: reduced resolution based on pixelSize
  smallCanvas.width = Math.max(1, Math.floor(W / cfg.pixelSize));
  smallCanvas.height = Math.max(1, Math.floor(H / cfg.pixelSize));

  // Ensure crisp scaling
  ctx.imageSmoothingEnabled = false;
  sctx.imageSmoothingEnabled = false;

  // Re-wrap text
  lines = wrapText(TEXT, tctx, W - cfg.margin * 2);
  totalTextHeight = lines.length * cfg.lineHeight;

  // Reset scroll so it starts nicely
  scrollY = 0;
}

function wrapText(text, context, maxWidth) {
  const paragraphs = text.split(/\n+/);
  context.font = `${cfg.fontSize}px ${cfg.font}`;
  const out = [];
  for (const p of paragraphs) {
    const words = p.trim().length ? p.trim().split(/\s+/) : [""]; // keep blank lines
    let line = "";
    for (const w of words) {
      const test = line ? line + " " + w : w;
      const m = context.measureText(test).width;
      if (m > maxWidth && line) {
        out.push(line);
        line = w;
      } else {
        line = test;
      }
    }
    out.push(line);
    out.push(""); // paragraph spacing (blank line)
  }
  return out;
}

function pickRandomBlock() {
  const t = TEXT.replace(/\s+/g, " ").trim();
  const len = t.length;
  if (len < 10) return t;
  const blockLen = randInt(cfg.blockCharsMin, cfg.blockCharsMax);
  const start = randInt(0, Math.max(0, len - blockLen - 1));
  const chunk = t.slice(start, start + blockLen);

  // Make it feel like a "data block": no punctuation emphasis, keep it plain
  return chunk;
}

function renderTextLayer(deltaSec) {
  tctx.clearRect(0, 0, W, H);
  tctx.fillStyle = cfg.bg;
  tctx.fillRect(0, 0, W, H);

  tctx.fillStyle = cfg.fg;
  tctx.font = `${cfg.fontSize}px ${cfg.font}`;
  tctx.textBaseline = "top";

  if (cfg.useBlocks) {
    const now = performance.now();
    if (now - lastBlockAt > cfg.blockIntervalMs) {
      lastBlockAt = now;
      blockText = pickRandomBlock();
      blockLines = wrapText(blockText, tctx, W - cfg.margin * 2);
      blockHeight = blockLines.length * cfg.lineHeight;
      // keep the block drifting upward slightly
      // (optional: randomize position)
    }

    // drift
    scrollY += cfg.scrollSpeed * deltaSec;
    // draw block near bottom moving upward
    const y0 = H - cfg.margin - blockHeight + (-scrollY % (H + blockHeight));
    drawLines(tctx, blockLines, cfg.margin, y0);

  } else {
    // continuous scroll of the full text
    scrollY += cfg.scrollSpeed * deltaSec;
    const yStart = cfg.margin - (scrollY % (totalTextHeight + H));
    // draw twice for seamless loop
    drawLines(tctx, lines, cfg.margin, yStart);
    drawLines(tctx, lines, cfg.margin, yStart + totalTextHeight);
  }
}

function drawLines(context, lineArr, x, y) {
  let yy = y;
  for (const line of lineArr) {
    // Blank line spacing
    if (line === "") {
      yy += cfg.lineHeight * 0.6;
      continue;
    }
    context.fillText(line, x, yy);
    yy += cfg.lineHeight;
  }
}

function pixelateToScreen() {
  // 1) Downscale full-res text layer to small canvas
  sctx.clearRect(0, 0, smallCanvas.width, smallCanvas.height);
  sctx.drawImage(textCanvas, 0, 0, smallCanvas.width, smallCanvas.height);

  // 2) Upscale small canvas to screen canvas with no smoothing
  ctx.clearRect(0, 0, W, H);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(smallCanvas, 0, 0, W, H);
}

function tick(ts) {
  const deltaSec = Math.min(0.05, (ts - lastTS) / 1000);
  lastTS = ts;

  renderTextLayer(deltaSec);
  pixelateToScreen();

  requestAnimationFrame(tick);
}

function randInt(a, b) {
  return Math.floor(a + Math.random() * (b - a + 1));
}

// Keyboard controls (quick tuning in-gallery)
window.addEventListener("keydown", (e) => {
  if (e.key === "[" ) { cfg.pixelSize = Math.max(2, cfg.pixelSize - 1); resize(); }
  if (e.key === "]" ) { cfg.pixelSize = Math.min(80, cfg.pixelSize + 1); resize(); }
  if (e.key === "-" ) { cfg.scrollSpeed = Math.max(0, cfg.scrollSpeed - 20); }
  if (e.key === "=" ) { cfg.scrollSpeed = cfg.scrollSpeed + 20; }
  if (e.key.toLowerCase() === "b") { cfg.useBlocks = !cfg.useBlocks; scrollY = 0; }
});

// Start
window.addEventListener("resize", resize);
resize();
requestAnimationFrame(tick);
</script>
</body>
</html>
